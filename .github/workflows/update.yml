name: Update data

# Runs the scraper and commits the refreshed table + fixtures.
#
# The matchcenter is behind Cloudflare. A patient headless browser gets through,
# but GitHub's datacenter IP is occasionally challenged, so the scrape step is
# BEST-EFFORT: if it can't get through, the run keeps the previous data instead of
# failing (no error emails). For a guaranteed refresh, run scraper/update.sh from
# your own machine.
# Times are UTC (Swiss local = UTC+1 winter / +2 summer).
on:
  schedule:
    - cron: "0 * * * *"          # hourly
    - cron: "*/20 5-17 * * 6"    # Saturdays (match day) every 20 min, 05:00-17:59 UTC
  workflow_dispatch:            # manual trigger from the Actions tab

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # allow committing the refreshed data back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape matchcenter (best effort)
        run: |
          python scraper/scrape.py \
            || echo "::warning::Scrape failed (Cloudflare?) — keeping previous data."

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/standings.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
