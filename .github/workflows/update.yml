name: Update data

# Runs the scraper and commits the refreshed table + fixtures.
#
# NOTE: GitHub's datacenter IPs are blocked by the matchcenter's Cloudflare, so
# SCHEDULED cloud runs currently fail. The schedule is therefore disabled and the
# reliable path is scraper/update.sh run from your own machine (residential IP).
# `workflow_dispatch` is kept so you can still test manually, or re-enable the
# schedule if you later route it through a residential proxy.
on:
  # schedule:
  #   - cron: "*/20 5-17 * * 6"   # Saturdays every 20 min, 05:00-17:59 UTC
  #   - cron: "0 4 * * *"         # daily baseline
  workflow_dispatch:            # manual trigger from the Actions tab

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # allow committing the refreshed data back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape matchcenter
        run: python scraper/scrape.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/standings.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
